services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: squealy_test
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d squealy_test"]
      interval: 1s
      timeout: 5s
      retries: 30
