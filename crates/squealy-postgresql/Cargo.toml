[package]
name = "squealy-postgresql"
version = "0.1.0"
edition = "2024"
description = "PostgreSQL backend for squealy"
license = "MIT"

[dependencies]
futures-core = "0.3"
squealy = { path = "../squealy" }
tokio-postgres = "0.7"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
