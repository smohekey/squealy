[package]
name = "squealy-postgresql"
description = "PostgreSQL backend for squealy"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true

[features]
default = []
# Schema/DDL management: SchemaBackend rendering, DdlExecutor (publish), and SchemaConnect. Off by
# default so query-only users carry none of it; the management engine and CLI enable it. Pulls tokio
# for spawning the connection task in SchemaConnect.
schema = ["dep:tokio"]

[dependencies]
bytes = "1"
futures-core.workspace = true
squealy.workspace = true
tokio = { version = "1", features = ["rt"], optional = true }
tokio-postgres = "0.7"

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
