[package]
name = "squealy-mysql"
description = "MySQL backend for squealy"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true
keywords.workspace = true
categories.workspace = true

[features]
# Native timestamp column support: enables the core feature so `SystemTime` maps to a timestamp
# column and can be used in the query builder (render-only; no MySQL Encode/Decode yet).
systemtime = ["squealy/systemtime"]

[dependencies]
futures-core.workspace = true
mysql_async = { version = "0.37", default-features = false, features = ["default-rustls"] }
squealy.workspace = true
thiserror.workspace = true
# `tokio::sync::Mutex` holds the single `Conn` behind interior mutability: query execution borrows
# `&self` (the core API) but `mysql_async` needs `&mut Conn`, so we lock across the await. Schema ops
# already have `&mut self` and use `get_mut()` without locking.
tokio = { version = "1", features = ["sync"] }

[dev-dependencies]
squealy-model.workspace = true
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
