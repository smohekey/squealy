name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest

    # Service containers mirroring compose.yaml, used by the `#[ignore]`d integration tests below.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: squealy_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d squealy_test"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: squealy_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30

    steps:
      - uses: actions/checkout@v5

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Install cargo-rdme
        run: cargo install cargo-rdme --version 1.5.0 --locked

      - name: Check README
        run: cargo rdme --workspace-project squealy --readme-path README.md --check

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test (no database required)
        run: cargo test --workspace

      - name: Integration tests (PostgreSQL)
        env:
          SQUEALY_POSTGRES_URL: postgres://postgres:postgres@127.0.0.1:5432/squealy_test
        run: |
          cargo test -p squealy-postgresql --test integration -- --ignored --test-threads=1
          cargo test -p squealy-model --test publish -- --ignored --test-threads=1

      - name: Integration tests (MySQL)
        env:
          SQUEALY_MYSQL_URL: mysql://root:root@127.0.0.1:3306/squealy_test
        run: cargo test -p squealy-mysql --test publish -- --ignored --test-threads=1

      # Compiles + runs an extraction stub against a fixture crate (no database needed).
      - name: CLI extraction test
        run: cargo test -p squealy-cli --test cli -- --ignored
