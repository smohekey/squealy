name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  msrv:
    name: MSRV (1.92)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.92
      - run: cargo check --workspace --all-targets --all-features

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: squealy_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d squealy_test"
          --health-interval 1s --health-timeout 5s --health-retries 30
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: squealy_test
        ports: ["3306:3306"]
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval 2s --health-timeout 5s --health-retries 30
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - run: cargo build --workspace --all-targets --all-features
      - run: cargo test --workspace --all-features
      - name: PostgreSQL integration tests
        env:
          SQUEALY_POSTGRES_URL: postgres://postgres:postgres@127.0.0.1:5432/squealy_test
        run: cargo test -p squealy-postgresql --test integration --all-features -- --ignored --test-threads=1
      - name: MySQL integration tests
        env:
          SQUEALY_MYSQL_URL: mysql://root:root@127.0.0.1:3306/squealy_test
        run: cargo test -p squealy-mysql --test integration --all-features -- --ignored --test-threads=1
