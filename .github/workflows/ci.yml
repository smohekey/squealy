name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest

    # PostgreSQL service container mirroring compose.yaml, used by the
    # `#[ignore]`d integration tests below.
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: squealy_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d squealy_test"
          --health-interval 1s
          --health-timeout 5s
          --health-retries 30

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Build
        run: cargo build --workspace --all-targets

      - name: Test (no database required)
        run: cargo test --workspace

      - name: Integration tests (PostgreSQL)
        env:
          SQUEALY_POSTGRES_URL: postgres://postgres:postgres@127.0.0.1:5432/squealy_test
        run: cargo test -p squealy-postgresql --test integration -- --ignored --test-threads=1
