# Supply-chain policy enforced in CI by `cargo deny check`.
# Advisories are also covered by `cargo audit`; this adds license, source, and duplicate checks.

[advisories]
version = 2
# proc-macro-error2 is unmaintained but only reachable transitively through mysql_async; there is
# no fixed release to move to yet. Reassess when mysql_async updates its derive dependency.
ignore = ["RUSTSEC-2026-0173"]

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]

[bans]
# Duplicate versions are common in large trees and not worth failing CI over.
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
