[workspace]
members = [
    "crates/squealy",
    "crates/squealy-cli",
    "crates/squealy-macros",
    "crates/squealy-model",
    "crates/squealy-mysql",
    "crates/squealy-postgresql",
    "crates/squealy-test",
]
resolver = "3"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
license = "MIT"
repository = "https://github.com/smohekey/squealy"
keywords = ["sql", "orm", "query-builder", "postgres", "database"]
categories = ["database"]

[workspace.dependencies]
squealy = { version = "0.1.0", path = "crates/squealy" }
squealy-macros = { version = "0.1.0", path = "crates/squealy-macros" }
squealy-model = { version = "0.1.0", path = "crates/squealy-model" }
squealy-mysql = { version = "0.1.0", path = "crates/squealy-mysql" }
squealy-postgresql = { version = "0.1.0", path = "crates/squealy-postgresql" }
squealy-test = { version = "0.1.0", path = "crates/squealy-test" }
futures-core = "0.3"
kdl = "6.5"
trybuild = "1.0"
zip = { version = "7.2", default-features = false }
